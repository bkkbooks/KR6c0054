front:
  text: 可明謹以為法之心修書上呈大居士仰惟大教利生唯般若空慧可以導萬行福羣生祛惑纍臻極理四處十有六會咸彰此道至摧萬有蕩一無金剛力最堅最利故世人多持誦之幽明顯應不易悉數翻譯有六經申通有三論隨機見別仍有異同至我天台大禪師妙悟通經作為此疏以釋秦本五代亂離流之東海諸師別有所述皆依傍諸論彌縫別譯破碎不能貫通此疏復還反有以為偽者樝菴嘗力辨焉人始信受愚頃於南湖觀室伏讀此疏喜不自勝且曰分實是方便二周明不可思議十事前後科判自非大師疇克若是回視諸家述作雖共有弘通美意莫能及也有僧善義勇化緣遂尋訪別本與之讐校刊留南湖後毒鼓嘗建講比以城居失火燎其板深為嗟惜茲承下諭知留意探討欲入疏從經以便看閲誠殊勝事也將以刊行乃蒙示及因得考其大略而評論焉蓋欲傳遠以廣利四衆是不可卒爾謹別紙繕寫呈上切祈詳覽不宣可明謹白行善欲便於檢閲將疏入經皈西山虗室講師求印可即蒙考校開示此疏源流又別紙批敷漏失句意俾添入完備行善於是不敢泯其所自併刊行此書勸衆信流通焉至元甲午年四明徐行善謹志
